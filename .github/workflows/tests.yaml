name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

jobs:
  Linting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1

  Test:
    needs: Linting
    name: ${{ matrix.os }}, ${{ matrix.env }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        os: [ubuntu-latest]
        env:
          - ci/envs/310-minimal.yaml
          - ci/envs/310-no-optional-deps.yaml
          - ci/envs/311-latest.yaml
          - ci/envs/312-latest.yaml

        include:
          - env: ci/envs/311-latest.yaml
            os: macos-latest
          - env: ci/envs/311-latest.yaml
            os: windows-latest
          - env: ci/envs/312-dev.yaml
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: ${{ matrix.env }}

      - name: Check and Log Environment
        run: |
          python -V
          python -c "import geopandas; geopandas.show_versions();"
          micromamba info
          micromamba list

      - name: Test
        run: |
          pytest -v -r a --color=yes --cov=dask_geopandas --cov-append --cov-report term-missing --cov-report xml .

      - uses: codecov/codecov-action@v5
